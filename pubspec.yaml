name: bump_comba
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+35

environment:
  sdk: ^3.7.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0

  # State & Storage
  shared_preferences: ^2.2.0

  cupertino_icons: ^1.0.8

  # Media Kit for video playback
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.0.4

  # Supabase for backend services
  supabase_flutter: ^2.3.0
  http: ^1.1.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  google_fonts: ^8.0.2
  cast: ^2.1.0
  bonsoir: ^5.0.0
  wakelock_plus: ^1.4.0
  shimmer: ^3.0.0
  google_mobile_ads: ^7.0.0
  purchases_flutter: ^9.15.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  device_info_plus: ^12.3.0
  flame_svg: ^1.11.14
  flutter_svg: ^2.2.2
  onesignal_flutter: ^5.2.2
  dio: ^5.9.1
  background_downloader: ^9.5.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  flutter_inappwebview: ^6.1.5
  html: ^0.15.4
  flutter_dotenv: ^6.0.0
  audio_service: ^0.18.18
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  windows:
    generate: true
    image_path: "assets/images/icon.jpg"
  image_path: "assets/images/icon.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logodepremium.png
    - assets/images/background.jpg
    - .env
