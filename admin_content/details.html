<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump Comba | Contenido</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <meta property="og:type" content="video.movie">
    <meta property="og:title" content="Mira este contenido en Bump Comba 🎬">
    <meta property="og:description" content="La mejor app para ver tus pelis y series favoritas. ¡Descárgala ya!">
    <meta property="og:image" content="https://bump-comba.vercel.app/logo.png">

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --red: #E8321A;
            --red-deep: #B5200C;
            --red-glow: rgba(232, 50, 26, 0.35);
            --gold: #F5C842;
            --bg: #080808;
            --surface: rgba(18, 18, 18, 0.9);
            --border: rgba(255,255,255,0.07);
            --text: #F0EDE8;
            --muted: rgba(240, 237, 232, 0.45);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        /* ── FILM GRAIN ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; opacity: 0.6;
        }

        /* ── AMBIENT LIGHT ── */
        .ambient {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(232,50,26,0.18) 0%, transparent 70%);
            top: -20%; left: -10%;
            animation: drift1 12s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(245,200,66,0.08) 0%, transparent 70%);
            bottom: -15%; right: -5%;
            animation: drift2 15s ease-in-out infinite alternate;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(232,50,26,0.1) 0%, transparent 70%);
            top: 50%; left: 60%;
            animation: drift3 10s ease-in-out infinite alternate;
        }

        @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(30px,40px)} }
        @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-25px,-30px)} }
        @keyframes drift3 { from{transform:translate(0,0) scale(1)} to{transform:translate(-20px,20px) scale(1.1)} }

        /* ── SCANLINES ── */
        .scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
        }

        /* ── MAIN LAYOUT ── */
        .stage {
            position: relative; z-index: 2;
            min-height: 100vh;
            display: grid;
            grid-template-rows: 1fr auto;
            place-items: center;
            padding: 24px;
        }

        /* ── CARD ── */
        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 44px 36px 40px;
            text-align: center;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 40px 80px -20px rgba(0,0,0,0.7),
                0 0 60px -20px var(--red-glow);
            animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── LOGO ── */
        .logo-ring {
            position: relative;
            width: 96px; height: 96px;
            margin: 0 auto 32px;
        }
        .logo-ring::before {
            content: '';
            position: absolute; inset: -4px;
            border-radius: 50%;
            background: conic-gradient(var(--red), var(--gold), var(--red), transparent 60%);
            animation: spin 6s linear infinite;
            opacity: 0.6;
        }
        .logo-ring::after {
            content: '';
            position: absolute; inset: -1px;
            border-radius: 50%;
            background: var(--bg);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .logo-inner {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #111;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .logo-inner img {
            width: 64%; height: 64%;
            object-fit: contain;
        }

        /* ── CONTENT BADGE ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(232,50,26,0.12);
            border: 1px solid rgba(232,50,26,0.25);
            color: #F07060;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 100px;
            margin-bottom: 18px;
            animation: cardIn 0.9s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .badge-dot {
            width: 6px; height: 6px;
            background: var(--red);
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── TITLE ── */
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            animation: cardIn 0.9s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        h1 span {
            color: var(--red);
        }

        p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.65;
            font-weight: 300;
            margin-bottom: 36px;
            animation: cardIn 0.9s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: cardIn 0.9s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

        /* ── BUTTON ── */
        .btn-primary {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 17px 24px;
            border-radius: 16px;
            background: var(--red);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-decoration: none;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 24px -6px var(--red-glow);
            animation: cardIn 0.9s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .btn-primary::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px -6px rgba(232,50,26,0.5);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-icon {
            width: 20px; height: 20px;
            fill: none; stroke: currentColor;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* ── STATUS ── */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            animation: cardIn 0.9s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .loader {
            width: 16px; height: 16px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .status-text {
            font-size: 13px;
            color: var(--muted);
        }

        /* ── FOOTER ── */
        .footer-bar {
            position: relative; z-index: 2;
            padding: 0 0 20px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ── FILM STRIP ACCENT ── */
        .filmstrip {
            position: fixed;
            top: 0; bottom: 0;
            width: 28px;
            display: flex;
            flex-direction: column;
            gap: 0;
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }
        .filmstrip-left { left: 0; }
        .filmstrip-right { right: 0; }
        .filmstrip-hole {
            flex-shrink: 0;
            height: 22px;
            margin: 4px 4px;
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Ambient light -->
    <div class="ambient">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
    </div>

    <!-- Scanlines -->
    <div class="scanlines"></div>

    <!-- Film strip decoration -->
    <div class="filmstrip filmstrip-left" id="strip-l"></div>
    <div class="filmstrip filmstrip-right" id="strip-r"></div>

    <div class="stage">
        <div class="card">

            <!-- Logo -->
            <div class="logo-ring">
                <div class="logo-inner">
                    <img src="logo.png" alt="Bump Comba" onerror="this.parentElement.innerHTML='<span style=\'font-family:Syne,sans-serif;font-weight:800;font-size:22px;color:#E8321A\'>B</span>'">
                </div>
            </div>

            <!-- Badge -->
            <div class="badge">
                <span class="badge-dot"></span>
                <span>Bump Comba</span>
            </div>

            <!-- Title & desc -->
            <h1 id="title">Abriendo en<br><span>Bump Comba</span></h1>
            <p id="desc">Si tienes la app instalada, se abrirá automáticamente. Si no, descárgala gratis.</p>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">Play Store</span>
                <div class="divider-line"></div>
            </div>

            <!-- CTA -->
            <a href="https://play.google.com/store/apps/details?id=com.juanchosky.bumpcomba" class="btn-primary" id="cta-btn">
                <svg class="btn-icon" viewBox="0 0 24 24">
                    <path d="M12 16v-4m0 0V8m0 4h4m-4 0H8"/>
                    <circle cx="12" cy="12" r="9"/>
                </svg>
                Descargar la app
            </a>

            <!-- Status -->
            <div class="status">
                <div class="loader"></div>
                <span class="status-text" id="status-text">Redirigiendo a Play Store…</span>
            </div>

        </div>
    </div>

    <div class="footer-bar">By Juan Aldm</div>

    <script>
        // Film strip holes
        function buildStrip(id) {
            const el = document.getElementById(id);
            const n = Math.ceil(window.innerHeight / 30) + 2;
            el.innerHTML = Array(n).fill('<div class="filmstrip-hole"></div>').join('');
        }
        buildStrip('strip-l');
        buildStrip('strip-r');

        // URL params
        const params = new URLSearchParams(window.location.search);
        const name = params.get('n');
        if (name) {
            document.title = `${name} | Bump Comba`;
            document.getElementById('title').innerHTML =
                `Mira<br><span>"${name}"</span>`;
            document.getElementById('desc').textContent =
                `Preparando todo para que disfrutes de "${name}" en la mejor calidad.`;
        }

        // Countdown status
        let t = 3;
        const statusEl = document.getElementById('status-text');
        const tick = setInterval(() => {
            t--;
            statusEl.textContent = t > 0
                ? `Redirigiendo en ${t}…`
                : 'Abriendo Play Store…';
            if (t <= 0) clearInterval(tick);
        }, 1000);

        // Redirect
        setTimeout(() => {
            window.location.href =
                "https://play.google.com/store/apps/details?id=com.juanchosky.bumpcomba";
        }, 3000);
    </script>
</body>
</html>
