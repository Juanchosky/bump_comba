workflows:
  ios-unsigned-sideload:
    name: iOS unsigned IPA (para Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bump_comba_env
    scripts:
      - name: Reconstruir archivo .env desde variable segura
        script: |
          echo "$DOTENV_BASE64" | base64 --decode > .env
          echo "Archivo .env creado. Variables encontradas:"
          grep -o '^[A-Z_]*=' .env || true
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Preparar config de iOS (sin compilar)
        script: |
          flutter build ios --release --no-codesign --config-only
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Compilar con xcodebuild sin firma
        script: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios-xcode \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build
      - name: Firmar ad-hoc para que AltStore pueda re-firmar
        script: |
          cd build/ios-xcode/Build/Products/Release-iphoneos
          # Firmar primero los frameworks/dylibs internos, luego la app completa
          if [ -d "Runner.app/Frameworks" ]; then
            find Runner.app/Frameworks -type f \( -name "*.dylib" -o -perm +111 \) -print0 2>/dev/null | xargs -0 -I {} codesign --force --sign - "{}" || true
            for fw in Runner.app/Frameworks/*.framework; do
              [ -d "$fw" ] && codesign --force --sign - "$fw"
            done
          fi
          codesign --force --deep --sign - Runner.app
          echo "Firma ad-hoc aplicada. Verificando:"
          codesign -dv Runner.app 2>&1 || true
      - name: Empaquetar .app en .ipa sin firmar
        script: |
          cd build/ios-xcode/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -y bump_comba_unsigned.ipa Payload
          rm -rf Payload
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          cp bump_comba_unsigned.ipa $CM_BUILD_DIR/build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios-xcode/Build/Products/Release-iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - juan.arrietaa@cecar.edu.co
        notify:
          success: true
          failure: true
