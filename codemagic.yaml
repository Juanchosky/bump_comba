workflows:
  ios-unsigned-sideload:
    name: iOS unsigned IPA (para Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Build iOS sin firmar
        script: |
          flutter build ios --release --no-codesign
      - name: Empaquetar .app en .ipa sin firmar
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -y bump_comba_unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - juan.arrietaa@cecar.edu.co
        notify:
          success: true
          failure: true
